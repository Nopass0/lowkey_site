services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./.env.backend
    environment:
      HOST: 0.0.0.0
      NODE_ENV: production
      PORT: 3001
      AI_LOCAL_BASE_URL: http://ollama:11434
    volumes:
      - ./deploy/runtime/${APP_ENV}/uploads:/app/uploads
    ports:
      - "127.0.0.1:${BACKEND_BIND_PORT}:3001"
    depends_on:
      - ollama
    healthcheck:
      test:
        - CMD
        - bun
        - -e
        - fetch('http://127.0.0.1:3001/').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      HOSTNAME: 0.0.0.0
      PORT: 3000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
    ports:
      - "127.0.0.1:${FRONTEND_BIND_PORT}:3000"
    healthcheck:
      test:
        - CMD
        - bun
        - -e
        - fetch('http://127.0.0.1:3000/').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ./deploy/runtime/${APP_ENV}/ollama:/root/.ollama

volumes:
