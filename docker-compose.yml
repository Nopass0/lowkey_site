services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - path: ./.env.backend
        required: false
    environment:
      HOST: 0.0.0.0
      NODE_ENV: production
      PORT: 3001
      AI_LOCAL_BASE_URL: http://ollama:11434
    volumes:
      - ./deploy/runtime/${APP_ENV:-main}/uploads:/app/uploads
      - ${LETSENCRYPT_ROOT_DIR:-/etc/letsencrypt}:/etc/letsencrypt:ro
    ports:
      - "127.0.0.1:${BACKEND_BIND_PORT:-3101}:3001"
    healthcheck:
      test:
        - CMD
        - bun
        - -e
        - fetch('http://127.0.0.1:3001/').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3101}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3100}
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      HOSTNAME: 0.0.0.0
      PORT: 3000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3101}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3100}
    ports:
      - "127.0.0.1:${FRONTEND_BIND_PORT:-3100}:3000"
    healthcheck:
      test:
        - CMD
        - bun
        - -e
        - fetch('http://127.0.0.1:3000/').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s

  n8n:
    profiles:
      - automation
    build:
      context: ./n8n
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - path: ./.env.n8n
        required: false
    environment:
      N8N_LISTEN_ADDRESS: 0.0.0.0
      N8N_PORT: 5678
      N8N_PROTOCOL: https
      NODE_PATH: /opt/n8n-external/node_modules
      N8N_CUSTOM_EXTENSIONS: /opt/n8n-custom/node_modules
      NODE_FUNCTION_ALLOW_BUILTIN: "*"
      NODE_FUNCTION_ALLOW_EXTERNAL: axios,lodash,dayjs,moment,uuid,zod,cheerio,openai,@voiddb/orm
      TZ: ${GENERIC_TIMEZONE:-Asia/Yekaterinburg}
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-Asia/Yekaterinburg}
    depends_on:
      - bitnet
    ports:
      - "127.0.0.1:${N8N_BIND_PORT:-5678}:5678"
    volumes:
      - ./deploy/runtime/${APP_ENV:-main}/n8n:/home/node/.n8n
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://127.0.0.1:5678/ >/dev/null 2>&1 || exit 1
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 40s

  bitnet:
    build:
      context: ./bitnet
      dockerfile: Dockerfile
      args:
        BITNET_MODEL_REPO: ${BITNET_MODEL_REPO:-1bitLLM/bitnet_b1_58-large}
        BITNET_MODEL_DIR_NAME: ${BITNET_MODEL_DIR_NAME:-bitnet_b1_58-large}
        BITNET_QUANT_TYPE: ${BITNET_QUANT_TYPE:-i2_s}
        BITNET_USE_PRETUNED: ${BITNET_USE_PRETUNED:-1}
    restart: unless-stopped
    environment:
      BITNET_PORT: 8080
      BITNET_MODEL_DIR_NAME: ${BITNET_MODEL_DIR_NAME:-bitnet_b1_58-large}
      BITNET_QUANT_TYPE: ${BITNET_QUANT_TYPE:-i2_s}
      BITNET_THREADS: ${BITNET_THREADS:-4}
      BITNET_CTX_SIZE: ${BITNET_CTX_SIZE:-4096}
      BITNET_TEMPERATURE: ${BITNET_TEMPERATURE:-0.7}
      BITNET_N_PREDICT: ${BITNET_N_PREDICT:-1024}
    ports:
      - "127.0.0.1:${BITNET_BIND_PORT:-8080}:8080"
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://127.0.0.1:8080/v1/models >/dev/null 2>&1 || exit 1
      interval: 20s
      timeout: 5s
      retries: 20
      start_period: 60s

  ollama:
    profiles:
      - ai
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ./deploy/runtime/${APP_ENV:-main}/ollama:/root/.ollama
