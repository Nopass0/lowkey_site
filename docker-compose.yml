services:
  backend:
    image: oven/bun:1.2.5
    working_dir: /app
    command:
      - sh
      - -lc
      - bun install --frozen-lockfile && bunx prisma generate && bunx prisma db push && bun run src/index.ts
    restart: unless-stopped
    env_file:
      - ./.env.backend
    environment:
      NODE_ENV: production
      PORT: 3001
      AI_LOCAL_BASE_URL: http://ollama:11434
    volumes:
      - ./backend:/app
      - ./deploy/runtime/${APP_ENV}/uploads:/app/uploads
      - backend_node_modules:/app/node_modules
    ports:
      - "127.0.0.1:${BACKEND_BIND_PORT}:3001"
    depends_on:
      - ollama

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "127.0.0.1:${FRONTEND_BIND_PORT}:3000"

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ./deploy/runtime/${APP_ENV}/ollama:/root/.ollama

volumes:
  backend_node_modules:
