# bogdan.lowkey.su — personal workspace
# HTTP: redirect to HTTPS + certbot challenge pass-through
server {
    listen 80;
    listen [::]:80;
    server_name bogdan.lowkey.su;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name bogdan.lowkey.su;

    # SSL certificates (managed by certbot)
    ssl_certificate     /etc/letsencrypt/live/bogdan.lowkey.su/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bogdan.lowkey.su/privkey.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_session_timeout       1d;
    ssl_session_cache         shared:BogdanSSL:10m;
    ssl_session_tickets       off;
    ssl_prefer_server_ciphers off;

    # HSTS (1 year)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Security headers
    add_header X-Frame-Options           "SAMEORIGIN"           always;
    add_header X-Content-Type-Options    "nosniff"              always;
    add_header X-XSS-Protection          "1; mode=block"        always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # Upload limit (files module)
    client_max_body_size 100m;

    # Gzip compression
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        font/truetype
        font/opentype
        image/svg+xml;

    # WebSocket upgrade map (reused by both upstreams)
    proxy_http_version 1.1;
    proxy_set_header   Upgrade    $http_upgrade;
    proxy_set_header   Connection $connection_upgrade;

    # Common proxy headers
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto https;

    # ----------------------------------------------------------------
    # Go backend — strip /api prefix before forwarding
    # ----------------------------------------------------------------
    location /api/ {
        proxy_pass http://127.0.0.1:8090/;

        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
        proxy_connect_timeout 10s;

        # Allow large uploads to reach the backend
        client_max_body_size 100m;
    }

    # certbot challenge (also reachable over HTTPS just in case)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ----------------------------------------------------------------
    # Next.js frontend — everything else
    # ----------------------------------------------------------------
    location / {
        proxy_pass http://127.0.0.1:3210;

        proxy_read_timeout  120s;
        proxy_send_timeout  120s;
        proxy_connect_timeout 10s;

        # Next.js HMR / SSE needs buffering disabled
        proxy_buffering off;
    }
}

# Connection upgrade map (must be in http context — place in
# /etc/nginx/conf.d/upgrade_map.conf if not already present,
# or add to /etc/nginx/nginx.conf http block)
# map $http_upgrade $connection_upgrade {
#     default upgrade;
#     ''      close;
# }
