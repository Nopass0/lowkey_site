services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - path: ./.env.bogdan
        required: true
    volumes:
      - ./uploads:/app/uploads
      - /etc/letsencrypt:/etc/letsencrypt:ro
    ports:
      - "127.0.0.1:8090:8090"
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://127.0.0.1:8090/health >/dev/null 2>&1 || exit 1
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://bogdan.lowkey.su/api
        NEXT_PUBLIC_SITE_URL: https://bogdan.lowkey.su
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      HOSTNAME: 0.0.0.0
      PORT: 3000
      NEXT_PUBLIC_API_URL: https://bogdan.lowkey.su/api
      NEXT_PUBLIC_SITE_URL: https://bogdan.lowkey.su
    ports:
      - "127.0.0.1:3210:3000"
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://127.0.0.1:3000/ >/dev/null 2>&1 || exit 1
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s
